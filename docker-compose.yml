services:
  # Ollama service with custom model
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    restart: unless-stopped

  # ChromaDB vector database
  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    restart: unless-stopped

  # MongoDB for logging
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=rag_system
    restart: unless-stopped

  # Mongo Express for database GUI
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password123@mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
      - ME_CONFIG_BASICAUTH_USERNAME=""
      - ME_CONFIG_BASICAUTH_PASSWORD=""
    depends_on:
      - mongodb
    restart: unless-stopped

  # Flask application
  flask-app:
    build: .
    container_name: rag_flask_app
    ports:
      - "5001:5000"
    volumes:
      - ./app:/app/app
      - uploaded_pdfs:/app/uploads
      - chroma_models_cache:/root/.cache/chroma
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chromadb:8000
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/rag_system?authSource=admin
    depends_on:
      - ollama
      - chromadb
      - mongodb
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  mongo_data:
  uploaded_pdfs:
  chroma_models_cache:

networks:
  default:
    name: rag_network
